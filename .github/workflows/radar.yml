# Radar Seragam — scraping harian + publikasi dashboard.
#
# Catatan lokasi: GitHub hanya mengeksekusi workflow di .github/workflows/
# pada ROOT repo, karena itu file ini di root (bukan di radar/.github/).
# Workflow ini tidak menyentuh folder pipeline/ (Fase 1).

name: radar

on:
  schedule:
    # 22:00 UTC = 05:00 WIB — data segar sebelum jam kerja.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Uji Human Feedback Loop
        run: |
          node --check radar/docs/js/human_feedback.js
          node --check radar/scripts/test_human_feedback.js
          node radar/scripts/test_human_feedback.js

      - name: Simpan snapshot data sebelumnya
        run: |
          mkdir -p .radar-prev
          cp radar/data/tenders.json .radar-prev/tenders.json 2>/dev/null || true
          cp radar/data/events.json .radar-prev/events.json 2>/dev/null || true

      # Kedua scraper hanya memakai pustaka standar — tanpa pip install.
      - name: Jalankan scraper
        run: |
          python radar/scrapers/tender.py
          python radar/scrapers/event.py

      - name: Guard hasil scraping
        env:
          RADAR_CURRENT_DIR: radar/data
          RADAR_PREVIOUS_DIR: .radar-prev
          RADAR_MIN_TENDER_ITEMS: "5"
          RADAR_MIN_EVENT_ITEMS: "5"
          RADAR_MAX_DROP_RATIO: "0.70"
        run: node radar/scripts/guard_data.js

      - name: Buat arsip agregat bulanan
        env:
          RADAR_DATA_DIR: radar/data
          RADAR_ARCHIVE_DIR: radar/archive/monthly
          RADAR_LKG_FILE: radar/archive/last-known-good.json
        run: node radar/scripts/archive_summary.js

      - name: Buat review queue manual
        env:
          RADAR_DATA_DIR: radar/data
          RADAR_REVIEW_OUTPUT: radar/docs/data/review_queue.json
          RADAR_OLD_ITEM_DAYS: "1095"
        run: node radar/scripts/build_review_queue.js

      - name: Buat qualification readiness
        env:
          RADAR_DATA_DIR: radar/data
          RADAR_REVIEW_QUEUE_FILE: radar/docs/data/review_queue.json
          RADAR_QUALIFICATION_RULES_FILE: radar/config/qualification_rules.json
          RADAR_QUALIFICATION_OUTPUT: radar/docs/data/qualification_readiness.json
          RADAR_QUALIFICATION_EXPIRED_DAYS: "1095"
        run: node radar/scripts/build_qualification_readiness.js

      # Dashboard di GitHub Pages membaca data/ relatif terhadap docs/.
      - name: Salin JSON ke docs/data
        run: |
          mkdir -p radar/docs/data
          cp radar/data/tenders.json radar/data/events.json radar/docs/data/

      - name: Commit data terbaru
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@github.com"
          git add radar/data radar/docs/data radar/archive
          git diff --cached --quiet || git commit -m "data: pembaruan radar harian"
          git push

      # Config disalin setelah commit agar tersedia di artifact Pages tanpa menjadi data feedback Git.
      - name: Salin aturan Human Feedback untuk Pages
        run: cp radar/config/human_feedback_rules.json radar/docs/data/human_feedback_rules.json

      - name: Upload artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: radar/docs

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
